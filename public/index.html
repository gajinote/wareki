<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>天保暦 — 太陰太陽暦</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;700&family=Shippori+Mincho:wght@400;700&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1a1208;
    --paper: #f5efe3;
    --paper-dark: #ede4d1;
    --vermillion: #c0392b;
    --gold: #b8860b;
    --gold-light: #d4a843;
    --moon-glow: #ffd700;
    --shadow: rgba(26,18,8,0.15);
    --border: rgba(26,18,8,0.12);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Serif JP', serif;
    background: var(--paper);
    color: var(--ink);
    min-height: 100vh;
    display: grid;
    grid-template-rows: auto 1fr auto;
    background-image:
      radial-gradient(ellipse at 80% 10%, rgba(184,134,11,0.06) 0%, transparent 60%),
      url("data:image/svg+xml,%3Csvg width='60' height='60' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='60' height='60' filter='url(%23noise)' opacity='0.025'/%3E%3C/svg%3E");
  }

  /* ── Header ── */
  header {
    border-bottom: 2px solid var(--gold);
    padding: 1.5rem 2rem 1rem;
    display: flex;
    align-items: baseline;
    gap: 1.5rem;
    position: relative;
  }
  header::after {
    content: '';
    position: absolute;
    bottom: -5px;
    left: 2rem;
    right: 2rem;
    height: 1px;
    background: var(--gold-light);
    opacity: 0.4;
  }
  .header-title {
    font-family: 'Shippori Mincho', serif;
    font-size: 1.8rem;
    font-weight: 700;
    letter-spacing: 0.3em;
    color: var(--ink);
  }
  .header-subtitle {
    font-size: 0.75rem;
    letter-spacing: 0.2em;
    color: var(--gold);
    font-weight: 300;
  }
  .header-nav {
    margin-left: auto;
    display: flex;
    gap: 0.5rem;
  }
  .btn {
    font-family: 'Noto Serif JP', serif;
    font-size: 0.8rem;
    padding: 0.35rem 0.9rem;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--ink);
    cursor: pointer;
    letter-spacing: 0.1em;
    transition: all 0.2s;
    border-radius: 2px;
  }
  .btn:hover { background: var(--paper-dark); border-color: var(--gold); }
  .btn.primary {
    background: var(--ink);
    color: var(--paper);
    border-color: var(--ink);
  }
  .btn.primary:hover { background: #2d2010; }

  /* ── Layout ── */
  main {
    display: grid;
    grid-template-columns: 320px 1fr;
    gap: 0;
    max-width: 1200px;
    margin: 0 auto;
    width: 100%;
    padding: 0;
  }

  /* ── Today Panel ── */
  .today-panel {
    border-right: 1px solid var(--border);
    padding: 2rem 1.5rem;
    display: flex;
    flex-direction: column;
    gap: 1.5rem;
    background: rgba(255,255,255,0.3);
  }

  .section-label {
    font-size: 0.65rem;
    letter-spacing: 0.3em;
    color: var(--gold);
    text-transform: uppercase;
    border-bottom: 1px solid var(--border);
    padding-bottom: 0.4rem;
    margin-bottom: 0.8rem;
  }

  .date-select {
    display: flex;
    gap: 0.4rem;
    align-items: center;
    flex-wrap: wrap;
  }
  .date-select input, .date-select select {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.85rem;
    border: 1px solid var(--border);
    background: var(--paper);
    color: var(--ink);
    padding: 0.3rem 0.5rem;
    border-radius: 2px;
    width: 70px;
  }
  .date-select input[type="number"]:first-child { width: 90px; }

  /* Moon display */
  .moon-display {
    text-align: center;
    padding: 1rem;
    background: var(--paper-dark);
    border: 1px solid var(--border);
    border-radius: 4px;
    position: relative;
    overflow: hidden;
  }
  .moon-display::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at 50% 50%, rgba(212,168,67,0.06), transparent 70%);
  }
  .moon-emoji {
    font-size: 4rem;
    display: block;
    line-height: 1;
    filter: drop-shadow(0 0 12px rgba(255,215,0,0.4));
    animation: moonFloat 6s ease-in-out infinite;
  }
  @keyframes moonFloat {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-4px); }
  }
  .moon-age {
    font-family: 'JetBrains Mono', monospace;
    font-size: 1.8rem;
    font-weight: 300;
    color: var(--gold);
    margin-top: 0.5rem;
  }
  .moon-age span { font-size: 0.9rem; color: var(--ink); opacity: 0.6; }
  .moon-phase-name {
    font-size: 0.85rem;
    letter-spacing: 0.15em;
    margin-top: 0.2rem;
    color: var(--ink);
    opacity: 0.75;
  }

  /* Tenpo date */
  .tenpo-date-display {
    text-align: center;
    padding: 1rem;
    border: 1px solid var(--border);
    border-radius: 4px;
    background: var(--paper-dark);
  }
  .tenpo-year-label {
    font-size: 0.7rem;
    letter-spacing: 0.2em;
    color: var(--gold);
    margin-bottom: 0.3rem;
  }
  .tenpo-kanshi {
    font-family: 'Shippori Mincho', serif;
    font-size: 1.2rem;
    letter-spacing: 0.2em;
    color: var(--vermillion);
    margin-bottom: 0.4rem;
  }
  .tenpo-main-date {
    font-family: 'Shippori Mincho', serif;
    font-size: 1.6rem;
    letter-spacing: 0.1em;
    line-height: 1.3;
  }
  .tenpo-leap { color: var(--vermillion); font-size: 0.7em; vertical-align: super; }
  .tenpo-day-name {
    font-size: 0.8rem;
    color: var(--ink);
    opacity: 0.6;
    margin-top: 0.3rem;
    letter-spacing: 0.1em;
  }

  /* Solar info */
  .solar-info {
    font-size: 0.8rem;
    line-height: 2;
  }
  .solar-info .row {
    display: flex;
    justify-content: space-between;
    border-bottom: 1px dotted var(--border);
    padding: 0.1rem 0;
  }
  .solar-info .label { opacity: 0.6; }
  .solar-info .value { font-family: 'JetBrains Mono', monospace; font-size: 0.75rem; }
  .sekki-badge {
    display: inline-block;
    background: var(--vermillion);
    color: white;
    font-size: 0.7rem;
    padding: 0.1rem 0.5rem;
    border-radius: 2px;
    letter-spacing: 0.1em;
  }

  /* ── Calendar Grid ── */
  .calendar-panel {
    padding: 2rem 1.5rem;
  }
  .calendar-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 1.5rem;
  }
  .calendar-nav {
    display: flex;
    align-items: center;
    gap: 1rem;
  }
  .nav-btn {
    width: 28px; height: 28px;
    border: 1px solid var(--border);
    background: transparent;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 1rem;
    border-radius: 2px;
    color: var(--ink);
    transition: all 0.2s;
  }
  .nav-btn:hover { background: var(--paper-dark); border-color: var(--gold); }
  .calendar-month-title {
    font-family: 'Shippori Mincho', serif;
    font-size: 1.4rem;
    letter-spacing: 0.2em;
  }
  .calendar-month-sub {
    font-size: 0.7rem;
    color: var(--gold);
    letter-spacing: 0.15em;
    margin-top: 0.1rem;
    text-align: center;
  }

  .cal-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 2px;
  }
  .cal-weekday {
    text-align: center;
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    color: var(--gold);
    padding: 0.4rem 0;
    border-bottom: 1px solid var(--border);
  }
  .cal-weekday.sun { color: var(--vermillion); }
  .cal-weekday.sat { color: #2660a4; }

  .cal-cell {
    min-height: 80px;
    padding: 0.4rem;
    border: 1px solid transparent;
    border-radius: 3px;
    cursor: pointer;
    transition: all 0.15s;
    position: relative;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .cal-cell:hover {
    background: var(--paper-dark);
    border-color: var(--border);
  }
  .cal-cell.today {
    background: rgba(192,57,43,0.05);
    border-color: var(--vermillion);
  }
  .cal-cell.selected {
    background: rgba(184,134,11,0.08);
    border-color: var(--gold);
  }
  .cal-cell.empty { cursor: default; }

  .greg-day {
    font-family: 'JetBrains Mono', monospace;
    font-size: 1rem;
    font-weight: 400;
    line-height: 1;
  }
  .cal-cell.sun .greg-day { color: var(--vermillion); }
  .cal-cell.sat .greg-day { color: #2660a4; }
  .cal-cell.today .greg-day { color: var(--vermillion); font-weight: 700; }

  .tenpo-cell-date {
    font-family: 'Shippori Mincho', serif;
    font-size: 0.7rem;
    color: var(--ink);
    opacity: 0.65;
    letter-spacing: 0.05em;
  }
  .tenpo-new-month {
    font-size: 0.6rem;
    color: var(--vermillion);
    font-family: 'Shippori Mincho', serif;
    letter-spacing: 0.05em;
    font-weight: 700;
  }

  .cell-moon {
    font-size: 0.85rem;
    margin-top: auto;
    display: flex;
    align-items: center;
    gap: 3px;
  }
  .cell-moon-age {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.6rem;
    color: var(--gold);
    opacity: 0.8;
  }
  .cell-sekki {
    font-size: 0.55rem;
    background: var(--vermillion);
    color: white;
    padding: 0 3px;
    border-radius: 1px;
    letter-spacing: 0.05em;
    position: absolute;
    top: 3px;
    right: 3px;
  }

  /* ── Compare Window ── */
  .compare-window {
    position: fixed;
    bottom: 1.5rem;
    right: 1.5rem;
    width: 300px;
    background: var(--paper);
    border: 1px solid var(--gold);
    border-radius: 4px;
    box-shadow: 0 8px 32px var(--shadow);
    z-index: 100;
    display: none;
  }
  .compare-window.visible { display: block; }
  .compare-window-header {
    padding: 0.6rem 0.8rem;
    background: var(--ink);
    color: var(--paper);
    font-size: 0.75rem;
    letter-spacing: 0.2em;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-radius: 3px 3px 0 0;
    cursor: move;
  }
  .compare-close {
    background: none; border: none; color: var(--paper);
    cursor: pointer; font-size: 1rem; opacity: 0.6; padding: 0;
  }
  .compare-close:hover { opacity: 1; }
  .compare-body {
    padding: 1rem;
    font-size: 0.8rem;
    line-height: 1.9;
  }
  .compare-row {
    display: grid;
    grid-template-columns: 90px 1fr;
    gap: 0.5rem;
    border-bottom: 1px dotted var(--border);
    padding: 0.2rem 0;
    align-items: center;
  }
  .compare-label {
    font-size: 0.65rem;
    letter-spacing: 0.15em;
    color: var(--gold);
    opacity: 0.8;
  }
  .compare-value {
    font-family: 'Shippori Mincho', serif;
    font-size: 0.85rem;
  }
  .compare-value.mono {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.75rem;
  }

  /* ── Footer ── */
  footer {
    border-top: 1px solid var(--border);
    padding: 0.8rem 2rem;
    font-size: 0.65rem;
    color: var(--ink);
    opacity: 0.4;
    letter-spacing: 0.1em;
    display: flex;
    justify-content: space-between;
  }

  /* Loading */
  .loading {
    opacity: 0.4;
    pointer-events: none;
  }
  .skeleton {
    background: linear-gradient(90deg, var(--paper-dark) 25%, var(--paper) 50%, var(--paper-dark) 75%);
    background-size: 200% 100%;
    animation: shimmer 1.2s infinite;
    border-radius: 2px;
    display: inline-block;
  }
  @keyframes shimmer {
    0% { background-position: -200% 0; }
    100% { background-position: 200% 0; }
  }

  /* ── 旧暦モード ── */
  .cal-grid.lunisolar {
    grid-template-columns: repeat(10, 1fr);
  }
  .cal-weekday.jun { color: var(--gold); }
  .greg-sub {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.6rem;
    color: var(--ink);
    opacity: 0.45;
  }
  .tenpo-day-primary {
    font-family: 'Shippori Mincho', serif;
    font-size: 0.85rem;
    font-weight: 700;
    letter-spacing: 0.05em;
    line-height: 1.2;
  }

  @media (max-width: 768px) {
    main { grid-template-columns: 1fr; }
    .today-panel { border-right: none; border-bottom: 1px solid var(--border); }
  }
</style>
</head>
<body>

<header>
  <div>
    <div class="header-title">天保暦</div>
    <div class="header-subtitle">太陰太陽暦 · Tenpo Lunisolar Calendar</div>
  </div>
  <nav class="header-nav">
    <button class="btn" onclick="showNewMoons()">朔日一覧</button>
    <button class="btn primary" onclick="toggleCompare()">比較表示</button>
  </nav>
</header>

<main>
  <!-- Left: Today Panel -->
  <aside class="today-panel">
    <div>
      <div class="section-label">日付選択</div>
      <div class="date-select">
        <input type="number" id="selYear" value="" min="1844" max="2100" placeholder="西暦">
        <span style="opacity:0.4">年</span>
        <input type="number" id="selMonth" value="" min="1" max="12" style="width:55px">
        <span style="opacity:0.4">月</span>
        <input type="number" id="selDay" value="" min="1" max="31" style="width:55px">
        <span style="opacity:0.4">日</span>
        <button class="btn primary" onclick="loadDate()">→</button>
      </div>
    </div>

    <div>
      <div class="section-label">月相</div>
      <div class="moon-display">
        <span class="moon-emoji" id="moonEmoji">🌕</span>
        <div class="moon-age"><span id="moonAge">—</span> <span>日</span></div>
        <div class="moon-phase-name" id="moonPhaseName">—</div>
      </div>
    </div>

    <div>
      <div class="section-label">天保暦</div>
      <div class="tenpo-date-display">
        <div class="tenpo-year-label">旧暦 <span id="tenpoYear">—</span> 年</div>
        <div class="tenpo-kanshi" id="tenpoKanshi">—</div>
        <div class="tenpo-main-date" id="tenpoDate">—</div>
        <div class="tenpo-day-name" id="tenpoDayName">—</div>
      </div>
    </div>

    <div>
      <div class="section-label">太陽情報</div>
      <div class="solar-info" id="solarInfo">
        <div class="row"><span class="label">太陽黄経</span><span class="value" id="sunLon">—°</span></div>
        <div class="row"><span class="label">節気</span><span class="value" id="sekkiLabel">—</span></div>
        <div class="row"><span class="label">月の日数</span><span class="value" id="monthLen">—日</span></div>
      </div>
    </div>
  </aside>

  <!-- Right: Calendar -->
  <section class="calendar-panel">
    <div class="calendar-header">
      <div class="calendar-nav">
        <button class="nav-btn" onclick="prevMonth()">◂</button>
        <div>
          <div class="calendar-month-title" id="calTitle">—</div>
          <div class="calendar-month-sub" id="calSub">—</div>
        </div>
        <button class="nav-btn" onclick="nextMonth()">▸</button>
      </div>
      <button class="btn" id="modeToggleBtn" onclick="toggleViewMode()">旧暦表示</button>
      <button class="btn" onclick="goToday()">今日</button>
    </div>

    <div class="cal-grid" id="calGrid">
      <div class="cal-weekday sun">日</div>
      <div class="cal-weekday">月</div>
      <div class="cal-weekday">火</div>
      <div class="cal-weekday">水</div>
      <div class="cal-weekday">木</div>
      <div class="cal-weekday sat">金</div>
      <div class="cal-weekday sat">土</div>
    </div>
  </section>
</main>

<!-- Compare Window -->
<div class="compare-window" id="compareWin">
  <div class="compare-window-header" id="compareHeader">
    <span>西暦 ⟷ 旧暦 比較</span>
    <button class="compare-close" onclick="toggleCompare()">✕</button>
  </div>
  <div class="compare-body" id="compareBody">
    日付を選択してください
  </div>
</div>

<footer>
  <span>天保暦 (1844〜) · 定気法 · Meeus Astronomical Algorithms</span>
  <span id="footerJD">JD —</span>
</footer>

<script>
const today = new Date();
let curYear = today.getFullYear();
let curMonth = today.getMonth() + 1;
let selDate = { year: curYear, month: curMonth, day: today.getDate() };
let compareVisible = false;
let monthData = null;

// 旧暦モード用状態
let viewMode = 'gregorian'; // 'gregorian' | 'lunisolar'
let curTenpoYear = null;
let curTenpoMonth = null;
let curTenpoIsLeap = false;

// Init
document.getElementById('selYear').value = selDate.year;
document.getElementById('selMonth').value = selDate.month;
document.getElementById('selDay').value = selDate.day;

async function fetchLunarMonth(gregYear, tenpoMonth, isLeap) {
  const r = await fetch(`/api/lunarmonth?year=${gregYear}&month=${tenpoMonth}&isLeap=${isLeap}`);
  if (!r.ok) throw new Error('API error');
  return r.json();
}

async function fetchDate(y, m, d) {
  const r = await fetch(`/api/date?year=${y}&month=${m}&day=${d}`);
  if (!r.ok) throw new Error('API error');
  return r.json();
}

async function fetchMonth(y, m) {
  const r = await fetch(`/api/month?year=${y}&month=${m}`);
  if (!r.ok) throw new Error('API error');
  return r.json();
}

async function loadDate() {
  const y = parseInt(document.getElementById('selYear').value);
  const m = parseInt(document.getElementById('selMonth').value);
  const d = parseInt(document.getElementById('selDay').value);
  if (!y || !m || !d) return;
  selDate = { year: y, month: m, day: d };
  curYear = y; curMonth = m;

  const data = await fetchDate(y, m, d);
  renderTodayPanel(data);
  await loadCalendar();
}

function renderTodayPanel(data) {
  const { tenpo, astronomy } = data;

  document.getElementById('moonEmoji').textContent = astronomy.moonEmoji;
  document.getElementById('moonAge').textContent = astronomy.moonAge;
  document.getElementById('moonPhaseName').textContent = astronomy.moonPhase;

  document.getElementById('tenpoYear').textContent = tenpo.year;
  document.getElementById('tenpoKanshi').textContent = tenpo.kanshi;
  const leapMark = tenpo.isLeap ? '<span class="tenpo-leap">閏</span>' : '';
  document.getElementById('tenpoDate').innerHTML =
    `${leapMark}${tenpo.monthName}　${tenpo.dayName}`;
  document.getElementById('tenpoDayName').textContent =
    `${tenpo.month}月 ${tenpo.day}日 (旧)`;

  document.getElementById('sunLon').textContent = astronomy.solarLongitude + '°';
  document.getElementById('sekkiLabel').innerHTML = astronomy.sekki
    ? `<span class="sekki-badge">${astronomy.sekki}</span>`
    : '—';
  document.getElementById('monthLen').textContent = tenpo.monthLength + '日';

  // JD footer
  const jd = dateToJD(selDate.year, selDate.month, selDate.day);
  document.getElementById('footerJD').textContent = `JD ${jd.toFixed(1)}`;

  if (compareVisible) renderCompare(data);
}

function renderCompare(data) {
  const { gregorian, tenpo, astronomy } = data;
  const g = gregorian;
  const MONTHS = ['','January','February','March','April','May','June','July','August','September','October','November','December'];
  document.getElementById('compareBody').innerHTML = `
    <div class="compare-row">
      <span class="compare-label">西暦</span>
      <span class="compare-value mono">${g.year}年 ${g.month}月 ${g.day}日</span>
    </div>
    <div class="compare-row">
      <span class="compare-label">旧暦年</span>
      <span class="compare-value">${tenpo.year}年 ${tenpo.kanshi}</span>
    </div>
    <div class="compare-row">
      <span class="compare-label">旧暦月</span>
      <span class="compare-value">${tenpo.isLeap ? '閏' : ''}${tenpo.monthName} (${tenpo.month}月)</span>
    </div>
    <div class="compare-row">
      <span class="compare-label">旧暦日</span>
      <span class="compare-value">${tenpo.dayName} (${tenpo.day}日)</span>
    </div>
    <div class="compare-row">
      <span class="compare-label">月齢</span>
      <span class="compare-value mono">${astronomy.moonAge}日 ${astronomy.moonEmoji}</span>
    </div>
    <div class="compare-row">
      <span class="compare-label">月相</span>
      <span class="compare-value">${astronomy.moonPhase}</span>
    </div>
    <div class="compare-row">
      <span class="compare-label">太陽黄経</span>
      <span class="compare-value mono">${astronomy.solarLongitude}°</span>
    </div>
    ${astronomy.sekki ? `<div class="compare-row">
      <span class="compare-label">節気</span>
      <span class="compare-value">${astronomy.sekki}</span>
    </div>` : ''}
  `;
}

async function loadCalendar() {
  if (viewMode === 'lunisolar') { await loadLunarCalendar(); return; }
  await loadGregorianCalendar();
}

async function loadGregorianCalendar() {
  const grid = document.getElementById('calGrid');
  grid.classList.remove('lunisolar');

  // ヘッダー（7列: 日〜土）を再構築
  while (grid.firstChild) grid.removeChild(grid.firstChild);
  ['日','月','火','水','木','金','土'].forEach((label, i) => {
    const d = document.createElement('div');
    d.className = `cal-weekday${i===0?' sun':i===6?' sat':''}`;
    d.textContent = label;
    grid.appendChild(d);
  });

  const data = await fetchMonth(curYear, curMonth);
  monthData = data;

  document.getElementById('calTitle').textContent = `${curYear}年 ${curMonth}月`;

  const tenpoMonths = [...new Set(data.days
    .filter(d => d.tenpo)
    .map(d => `${d.tenpo.isLeap ? '閏' : ''}${d.tenpo.monthName}`)
  )];
  document.getElementById('calSub').textContent = `旧暦 ${tenpoMonths.join(' / ')}`;

  const firstDay = new Date(curYear, curMonth - 1, 1).getDay();
  for (let i = 0; i < firstDay; i++) {
    const cell = document.createElement('div');
    cell.className = 'cal-cell empty';
    grid.appendChild(cell);
  }

  const todayStr = `${today.getFullYear()}-${today.getMonth()+1}-${today.getDate()}`;

  data.days.forEach(d => {
    const cell = document.createElement('div');
    const dow = new Date(curYear, curMonth - 1, d.day).getDay();
    const isToday = `${curYear}-${curMonth}-${d.day}` === todayStr;
    const isSel = selDate.year === curYear && selDate.month === curMonth && selDate.day === d.day;

    cell.className = `cal-cell${dow === 0 ? ' sun' : dow === 6 ? ' sat' : ''}${isToday ? ' today' : ''}${isSel ? ' selected' : ''}`;
    cell.onclick = () => selectDay(d.day);

    let inner = `<div class="greg-day">${d.day}</div>`;
    if (d.tenpo) {
      if (d.tenpo.isNewMonth) {
        inner += `<div class="tenpo-new-month">${d.tenpo.isLeap ? '閏' : ''}${d.tenpo.monthName}</div>`;
      }
      inner += `<div class="tenpo-cell-date">${d.tenpo.dayName}</div>`;
    }
    if (d.sekki) {
      inner += `<div class="cell-sekki">${d.sekki}</div>`;
    }
    inner += `<div class="cell-moon">${d.moonEmoji}<span class="cell-moon-age">${d.moonAge}</span></div>`;

    cell.innerHTML = inner;
    grid.appendChild(cell);
  });
}

async function loadLunarCalendar() {
  const data = await fetchLunarMonth(curTenpoYear, curTenpoMonth, curTenpoIsLeap);
  if (!data) return;

  const leapLabel = data.isLeap ? '閏' : '';
  document.getElementById('calTitle').textContent =
    `${leapLabel}${data.tenpoMonthName}（旧暦 ${data.tenpoMonth}月）`;
  const s = data.startGreg, e = data.endGreg;
  document.getElementById('calSub').textContent =
    `グレゴリオ暦 ${s.year}/${String(s.month).padStart(2,'0')}/${String(s.day).padStart(2,'0')} 〜 ${e.year}/${String(e.month).padStart(2,'0')}/${String(e.day).padStart(2,'0')}`;

  const grid = document.getElementById('calGrid');
  grid.classList.add('lunisolar');

  while (grid.firstChild) grid.removeChild(grid.firstChild);
  ['一','二','三','四','五','六','七','八','九','十'].forEach(h => {
    const d = document.createElement('div');
    d.className = 'cal-weekday jun';
    d.textContent = h;
    grid.appendChild(d);
  });

  const todayStr = `${today.getFullYear()}-${today.getMonth()+1}-${today.getDate()}`;

  data.days.forEach(d => {
    const cell = document.createElement('div');
    const g = d.greg;
    const isToday = `${g.year}-${g.month}-${g.day}` === todayStr;
    const isSel = selDate.year === g.year && selDate.month === g.month && selDate.day === g.day;

    cell.className = `cal-cell${isToday ? ' today' : ''}${isSel ? ' selected' : ''}`;
    cell.onclick = () => selectLunarDay(d);

    let inner = `<div class="tenpo-day-primary">${d.dayName}</div>`;
    inner += `<div class="greg-sub">${g.month}/${g.day}</div>`;
    if (d.sekki) inner += `<div class="cell-sekki">${d.sekki}</div>`;
    inner += `<div class="cell-moon">${d.moonEmoji}<span class="cell-moon-age">${d.moonAge}</span></div>`;

    cell.innerHTML = inner;
    grid.appendChild(cell);
  });

  if (data.length === 29) {
    const empty = document.createElement('div');
    empty.className = 'cal-cell empty';
    grid.appendChild(empty);
  }
}

async function selectLunarDay(d) {
  selDate = { year: d.greg.year, month: d.greg.month, day: d.greg.day };
  document.getElementById('selYear').value = selDate.year;
  document.getElementById('selMonth').value = selDate.month;
  document.getElementById('selDay').value = selDate.day;

  const data = await fetchDate(selDate.year, selDate.month, selDate.day);
  renderTodayPanel(data);
  await loadLunarCalendar();
}

async function prevLunarMonth() {
  const r = await fetch(`/api/newmoons?year=${curTenpoYear}`);
  const data = await r.json();
  const list = data.months;
  const idx = list.findIndex(m => m.tenpoMonth === curTenpoMonth && m.isLeap === curTenpoIsLeap);
  if (idx <= 0) return;
  const prev = list[idx - 1];
  curTenpoYear = prev.startGreg.year;
  curTenpoMonth = prev.tenpoMonth;
  curTenpoIsLeap = prev.isLeap;
  await loadCalendar();
}

async function nextLunarMonth() {
  const r = await fetch(`/api/newmoons?year=${curTenpoYear}`);
  const data = await r.json();
  const list = data.months;
  const idx = list.findIndex(m => m.tenpoMonth === curTenpoMonth && m.isLeap === curTenpoIsLeap);
  if (idx < 0 || idx >= list.length - 1) return;
  const next = list[idx + 1];
  curTenpoYear = next.startGreg.year;
  curTenpoMonth = next.tenpoMonth;
  curTenpoIsLeap = next.isLeap;
  await loadCalendar();
}

async function toggleViewMode() {
  const btn = document.getElementById('modeToggleBtn');
  const grid = document.getElementById('calGrid');
  if (viewMode === 'gregorian') {
    const data = await fetchDate(selDate.year, selDate.month, selDate.day);
    curTenpoYear = data.tenpo.year;
    curTenpoMonth = data.tenpo.month;
    curTenpoIsLeap = data.tenpo.isLeap;
    viewMode = 'lunisolar';
    btn.textContent = 'グレゴリオ表示';
  } else {
    viewMode = 'gregorian';
    grid.classList.remove('lunisolar');
    btn.textContent = '旧暦表示';
  }
  await loadCalendar();
}

async function selectDay(day) {
  selDate = { year: curYear, month: curMonth, day };
  document.getElementById('selYear').value = selDate.year;
  document.getElementById('selMonth').value = selDate.month;
  document.getElementById('selDay').value = selDate.day;

  const data = await fetchDate(curYear, curMonth, day);
  renderTodayPanel(data);

  // Re-render calendar to update selection
  loadCalendar();
}

function prevMonth() {
  if (viewMode === 'lunisolar') { prevLunarMonth(); return; }
  curMonth--;
  if (curMonth < 1) { curMonth = 12; curYear--; }
  loadCalendar();
}
function nextMonth() {
  if (viewMode === 'lunisolar') { nextLunarMonth(); return; }
  curMonth++;
  if (curMonth > 12) { curMonth = 1; curYear++; }
  loadCalendar();
}
async function goToday() {
  curYear = today.getFullYear();
  curMonth = today.getMonth() + 1;
  selDate = { year: curYear, month: curMonth, day: today.getDate() };
  document.getElementById('selYear').value = selDate.year;
  document.getElementById('selMonth').value = selDate.month;
  document.getElementById('selDay').value = selDate.day;
  if (viewMode === 'lunisolar') {
    const data = await fetchDate(selDate.year, selDate.month, selDate.day);
    curTenpoYear = data.tenpo.year;
    curTenpoMonth = data.tenpo.month;
    curTenpoIsLeap = data.tenpo.isLeap;
    renderTodayPanel(data);
    await loadCalendar();
  } else {
    loadDate();
  }
}

function toggleCompare() {
  compareVisible = !compareVisible;
  document.getElementById('compareWin').classList.toggle('visible', compareVisible);
  if (compareVisible) {
    fetchDate(selDate.year, selDate.month, selDate.day).then(renderCompare);
    makeDraggable(document.getElementById('compareWin'), document.getElementById('compareHeader'));
  }
}

function showNewMoons() {
  fetch(`/api/newmoons?year=${curYear}`)
    .then(r => r.json())
    .then(data => {
      const rows = data.months.map(m =>
        `${m.startGreg.year}/${String(m.startGreg.month).padStart(2,'0')}/${String(m.startGreg.day).padStart(2,'0')} ` +
        `→ ${m.isLeap ? '閏' : ''}${m.tenpoMonthName} (${m.length}日) ` +
        (m.chuki ? `[${m.chuki.name}]` : '[中気なし=閏]')
      ).join('\n');
      alert(`${curYear}年 朔日一覧\n\n${rows}`);
    });
}

function makeDraggable(el, handle) {
  let ox = 0, oy = 0, x = 0, y = 0;
  handle.onmousedown = e => {
    e.preventDefault();
    ox = e.clientX - el.offsetLeft;
    oy = e.clientY - el.offsetTop;
    document.onmousemove = e => {
      x = e.clientX - ox; y = e.clientY - oy;
      el.style.left = x + 'px'; el.style.top = y + 'px';
      el.style.right = 'auto'; el.style.bottom = 'auto';
    };
    document.onmouseup = () => {
      document.onmousemove = null;
      document.onmouseup = null;
    };
  };
}

function dateToJD(y, m, d) {
  if (m <= 2) { y--; m += 12; }
  const A = Math.floor(y / 100);
  const B = 2 - A + Math.floor(A / 4);
  return Math.floor(365.25 * (y + 4716)) + Math.floor(30.6001 * (m + 1)) + d + B - 1524.5;
}
